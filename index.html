// Global error catcher - shows errors on screen if React fails to render
window.onerror = function(msg, url, line, col, err) {
  var root = document.getElementById("root");
  if(root) root.innerHTML = '<div style="padding:40px;font-family:monospace;background:#1e293b;color:#f87171;min-height:100vh">' +
    '<h2 style="color:#fbbf24">⚠️ BOS Value Pro - Error</h2>' +
    '<pre style="white-space:pre-wrap;color:#94a3b8;margin-top:16px">' + msg + '\n\nLine: ' + line + ', Col: ' + col +
    (err && err.stack ? '\n\nStack:\n' + err.stack : '') + '</pre>' +
    '<p style="color:#64748b;margin-top:16px">Please screenshot this error and report it.</p></div>';
};
window.addEventListener("unhandledrejection", function(e) {
  var root = document.getElementById("root");
  if(root && !root.hasChildNodes()) root.innerHTML = '<div style="padding:40px;font-family:monospace;background:#1e293b;color:#f87171;min-height:100vh">' +
    '<h2 style="color:#fbbf24">⚠️ Promise Error</h2>' +
    '<pre style="white-space:pre-wrap;color:#94a3b8">' + String(e.reason) + '</pre></div>';
});
</script>

// ── Stock Price Fetcher (Yahoo Finance via CORS proxy) ──
// Error codes: E101=Yahoo CORS proxy fail, E105=tickers not found

async function fetchPxYahoo(tickers,signal){
  if(!tickers.length)return{};
  const out={};const ts=Date.now();
  const proxies=["https://corsproxy.io/?","https://api.allorigins.win/get?url=","https://api.codetabs.com/v1/proxy?quest="];
  const queue=[...tickers];const workers=Math.min(6,queue.length);
  const doOne=async()=>{while(queue.length){
    if(signal?.aborted)return;
    const tk=queue.shift();
    const yUrl=`https://query1.finance.yahoo.com/v8/finance/chart/${tk}?interval=1d&range=1d&_=${ts}`;
    for(const proxyBase of proxies){
      if(signal?.aborted)return;
      const isAllOrigins=proxyBase.includes("allorigins");
      const isCodetabs=proxyBase.includes("codetabs");
      const url=isCodetabs?`${proxyBase}${yUrl}`:isAllOrigins?`${proxyBase}${encodeURIComponent(yUrl)}`:`${proxyBase}${encodeURIComponent(yUrl)}`;
      try{
        const tc=new AbortController();const timer=setTimeout(()=>tc.abort(),6000);
        if(signal){signal.addEventListener("abort",()=>tc.abort(),{once:true})}
        const r=await fetch(url,{signal:tc.signal});clearTimeout(timer);
        if(!r.ok)continue;
        const raw=await r.json();
        const body=raw.contents?JSON.parse(raw.contents):raw;
        const meta=body?.chart?.result?.[0]?.meta;
        const price=meta?.regularMarketPrice||body?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(Boolean)?.slice(-1)?.[0];
        if(price&&price>0){out[tk.toUpperCase()]=+price.toFixed(4);break;}
      }catch{}
    }
  }};
  try{await Promise.all(Array.from({length:workers},doOne))}catch{}
  return out;
}

async function fetchPx(tickers,onProgress,signal,onStage){
  if(!tickers.length)return{};
  let out={};const errors=[];

  // Phase 1: Yahoo Finance via CORS proxy
  if(onStage)onStage("yahoo",0);
  try{out=await fetchPxYahoo(tickers,signal)}catch{}
  if(signal?.aborted)return out;
  const yahooCount=Object.keys(out).length;
  if(yahooCount>0&&onStage)onStage("yahoo-done",yahooCount);
  let missing=tickers.filter(t=>!out[t]);
  if(!missing.length){if(onProgress)onProgress(1,1,[]);return out;}
  if(yahooCount===0)errors.push("E101: Yahoo CORS proxy 無回應");

  if(missing.length>0)errors.push("E105: "+missing.join(",")+" 無法取得");
  if(errors.length)out._errors=errors;
  if(onProgress)onProgress(1,1,[]);
  return out;
}

function newP(n){return{id:uid(),name:n,createdAt:td(),capital:10000,capitalMode:"fixed",benchmark:"SPY",holdings:{},cash:0,targets:{},prices:{},history:[],driftThreshold:5}}
function calcNAV(h,px,c=0){let v=0;for(const[t,x]of Object.entries(h))v+=(x.shares||0)*(px[t]||0);return v+c}
function calcPerf(hist){if(!hist.length)return{totalReturn:0,records:[],annReturn:null,maxDD:0};const base=hist[0].capital;const recs=hist.map((r,i)=>{const pv=i>0?hist[i-1].nav:base;return{...r,periodRet:pv>0?(r.nav/pv-1)*100:0,cumRet:base>0?(r.nav/base-1)*100:0}});const last=hist[hist.length-1],tr=base>0?(last.nav/base-1)*100:0,days=hist.length>1?(new Date(last.date)-new Date(hist[0].date))/864e5:0,yrs=days/365.25,ar=yrs>.1?(Math.pow(last.nav/base,1/yrs)-1)*100:null;let pk=0,mdd=0;recs.forEach(r=>{if(r.nav>pk)pk=r.nav;const dd=pk>0?(r.nav/pk-1)*100:0;if(dd<mdd)mdd=dd});return{totalReturn:tr,annReturn:ar,maxDD:mdd,records:recs}}
function calcBP(h){if(h.length<2)return{totalReturn:0};const f=h.find(r=>r.benchPrice>0),l=[...h].reverse().find(r=>r.benchPrice>0);if(!f||!l||f===l)return{totalReturn:0};return{totalReturn:(l.benchPrice/f.benchPrice-1)*100}}
function calcDrift(p){const tks=Object.keys(p.targets||{}).filter(tk=>(parseFloat(p.targets[tk])||0)>0);if(!tks.length)return{maxAbs:0,drifts:[],needRebal:false};const totalVal=tks.reduce((s,tk)=>s+(p.holdings[tk]?.shares||0)*(p.prices[tk]||0),0)+(p.cash||0);if(totalVal<=0)return{maxAbs:0,drifts:[],needRebal:false};const drifts=tks.map(tk=>{const actual=(p.holdings[tk]?.shares||0)*(p.prices[tk]||0)/totalVal*100;const target=parseFloat(p.targets[tk])||0;return{tk,target,actual:+actual.toFixed(2),drift:+(actual-target).toFixed(2)}}).sort((a,b)=>Math.abs(b.drift)-Math.abs(a.drift));const maxAbs=Math.max(...drifts.map(d=>Math.abs(d.drift)),0);return{maxAbs,drifts,needRebal:maxAbs>=(p.driftThreshold||5)}}
function calcRisk(hist){const rets=[];for(let i=1;i<hist.length;i++){const pv=hist[i-1].nav,cv=hist[i].nav;if(pv>0)rets.push((cv/pv-1)*100)}if(rets.length<2)return null;const avg=rets.reduce((s,r)=>s+r,0)/rets.length;const std=Math.sqrt(rets.reduce((s,r)=>s+Math.pow(r-avg,2),0)/(rets.length-1));const downRets=rets.filter(r=>r<0);const downStd=downRets.length>1?Math.sqrt(downRets.reduce((s,r)=>s+r*r,0)/downRets.length):std;const sharpe=std>0?avg/std*Math.sqrt(12):0;const sortino=downStd>0?avg/downStd*Math.sqrt(12):0;const bRets=[];for(let i=1;i<hist.length;i++){const bp=hist[i-1].benchPrice,bc=hist[i].benchPrice;if(bp>0&&bc>0)bRets.push((bc/bp-1)*100)}let beta=null;if(bRets.length>=2&&bRets.length===rets.length){const bavg=bRets.reduce((s,r)=>s+r,0)/bRets.length;const num=rets.reduce((s,r,i)=>s+(r-avg)*(bRets[i]-bavg),0);const den=bRets.reduce((s,r)=>s+Math.pow(r-bavg,2),0);if(den>0)beta=num/den}return{sharpe:+sharpe.toFixed(2),sortino:+sortino.toFixed(2),beta:beta!=null?+beta.toFixed(2):null,volatility:+std.toFixed(2),avgReturn:+avg.toFixed(2),periods:rets.length}}
function genTOS(o){return o.filter(x=>x.diff!==0&&x.price>0).map(x=>`${x.diff>0?"BUY":"SELL"} ${x.diff>0?"+":"-"}${Math.abs(x.diff)} ${x.tk} @${x.price.toFixed(2)} LMT`)}
function sortOrd(o,sk,sd){const d=sd==="asc"?1:-1;return[...o].sort((a,b)=>{if(sk==="name")return d*a.tk.localeCompare(b.tk);if(sk==="cat"){const ai=CAT_ORD.indexOf(a.info.cat),bi=CAT_ORD.indexOf(b.info.cat);if(ai!==bi)return d*(ai-bi);return a.tk.localeCompare(b.tk)}if(sk==="pct")return d*((a.pct||0)-(b.pct||0));if(sk==="diff")return d*((a.diff||0)-(b.diff||0));return 0})}
function parseBrokerCSV(text){
  const cleaned=text.replace(/^\uFEFF/,"").trim();
  const allLines=cleaned.split(/\r?\n/);
  let headerIdx=allLines.findIndex(l=>/symbol|ticker|quantity|shares|stock/i.test(l));
  if(headerIdx<0)return{holdings:[],errors:["找不到欄位標題行"]};
  const dataLines=[];
  for(let i=headerIdx+1;i<allLines.length;i++){
    const l=allLines[i].trim();
    if(!l||/^"?totals?|^"?account|^"?--/i.test(l))break;
    dataLines.push(l);
  }
  if(!dataLines.length)return{holdings:[],errors:["沒有找到持倉資料"]};
  const csvBlock=[allLines[headerIdx],...dataLines].join("\n");
  const result=Papa.parse(csvBlock,{header:true,dynamicTyping:true,skipEmptyLines:true});
  if(!result.data?.length)return{holdings:[],errors:["無法解析"]};
  const headers=Object.keys(result.data[0]||{}).map(h=>h.trim().toLowerCase().replace(/"/g,""));
  const origH=Object.keys(result.data[0]||{});
  const findCol=ns=>headers.find(h=>ns.some(n=>h.includes(n)));
  const gk=lc=>origH.find(k=>k.trim().toLowerCase().replace(/"/g,"")==lc);
  const symCol=findCol(["symbol","ticker","stock","代碼","underlying"]);
  const qtyCol=findCol(["quantity","shares","qty","股數","數量"]);
  const pxCol=findCol(["price","market price","現價","last","mark"]);
  const costCol=findCol(["cost basis","average cost","avg cost","avg price","成本","均價"]);
  const typeCol=findCol(["security type","type","instrument","put/call"]);
  if(!symCol)return{holdings:[],errors:["找不到 Symbol 欄位，請確認下載的是「倉位」CSV"]};
  const holdings=[];
  result.data.forEach(row=>{
    const raw=String(row[gk(symCol)]||"").trim().replace(/"/g,"").toUpperCase();
    if(!raw||raw==="-"||raw==="SYMBOL")return;
    const qty=parseFloat(String(row[gk(qtyCol)]||"").replace(/[,$"]/g,""))||0;
    const px=parseFloat(String(row[gk(pxCol)]||"").replace(/[,$"]/g,""))||0;
    const cost=parseFloat(String(row[gk(costCol)]||"").replace(/[,$"]/g,""))||0;
    const tp=typeCol?String(row[gk(typeCol)]||"").replace(/"/g,"").trim():"";
    const isOpt=/call|put|option/i.test(tp)||/\s+\d{2}\/\d{2}\/\d{4}/.test(raw);
    const ticker=raw.replace(/[^A-Z0-9]/g,"").slice(0,6);
    if(ticker.length>=1&&Math.abs(qty)>=0.001)
      holdings.push({ticker,shares:Math.abs(qty),price:px,avgCost:cost||px,type:isOpt?"option":"stock"});
  });
  return{holdings,errors:holdings.length?[]:["解析成功但沒有找到有效持倉"]};
}

}

function OverviewV({portfolios,switchP}){const[data,setData]=useState([]);useEffect(()=>{(async()=>{const r=[];for(const pi of portfolios){const d=await sG(PP+pi.id);if(d){const nav=calcNAV(d.holdings,d.prices,d.cash);const pf=calcPerf(d.history);r.push({...pi,nav,data:d,...pf,cnt:d.history.length})}}setData(r)})()},[portfolios]);
  const mergedH={},mergedCat={};let totalNav=0;data.forEach(d=>{totalNav+=d.nav;Object.entries(d.data?.holdings||{}).filter(([,h])=>h.shares>0).forEach(([tk,h])=>{const px=d.data.prices[tk]||0,mv=h.shares*px;mergedH[tk]=(mergedH[tk]||0)+mv;const cat=getA(tk).cat;mergedCat[cat]=(mergedCat[cat]||0)+mv})});
  const topH=Object.entries(mergedH).sort((a,b)=>b[1]-a[1]).slice(0,10);
  return <div><h2 style={gs.vt}>🏠 全部組合總覽</h2>

    {Object.keys(mergedCat).length>0&&<GCard style={{padding:12,marginBottom:12}}><h3 style={gs.pt}>🌐 全資產類別分布</h3><div style={{display:"flex",borderRadius:6,overflow:"hidden",height:28}}>{Object.entries(mergedCat).sort((a,b)=>b[1]-a[1]).map(([cat,mv])=>{const pct=totalNav>0?mv/totalNav*100:0;const info=Object.values(ASSET_DB).find(a=>a.cat===cat);return pct>1?<div key={cat} style={{width:pct+"%",background:info?.c||"#64748b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",transition:"width .3s"}} title={`${cat}: ${pct.toFixed(1)}%`}>{pct>8?`${cat} ${pct.toFixed(0)}%`:""}</div>:null})}</div></GCard>}
    {topH.length>0&&<GCard style={{padding:12,marginBottom:12}}><h3 style={gs.pt}>🏆 跨組合持倉 TOP 10</h3><table style={gs.tbl}><thead><tr><th style={gs.th}>資產</th><th style={gs.th}>類別</th><th style={gs.th}>總市值</th><th style={gs.th}>佔比</th></tr></thead><tbody>{topH.map(([tk,mv],i)=>{const info=getA(tk);return <tr key={tk} style={{...gs.tr,animation:`slideInL .2s ${i*.04}s both`}}><td style={gs.tdB}><span style={{...gs.dot,background:info.c}}/>{tk}</td><td style={{...gs.td,color:info.c,fontSize:10}}>{info.cat}</td><td style={gs.tdr}>{$f(mv)}</td><td style={gs.tdr}>{totalNav>0?Nf(mv/totalNav*100)+"%":"—"}</td></tr>})}</tbody></table></GCard>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>{data.map((d,i)=><GCard key={d.id} glow={d.totalReturn>=0?"#22c55e":"#ef4444"} style={{padding:14,cursor:"pointer",animation:`cardIn .4s ${i*.08}s both`}} onClick={()=>switchP(d.id)}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><b style={{color:"var(--text)"}}>{d.name}</b><span style={{fontWeight:800,color:d.totalReturn>=0?"#22c55e":"#ef4444"}}>{Pf(d.totalReturn)}</span></div><div style={{display:"flex",gap:12,fontSize:11,color:"var(--text2)"}}><span>{$f(d.nav)}</span><span>{d.cnt}次</span></div></GCard>)}</div></div>;}

function RebalV({p,saveP,fetchPrices,lang="zh",fetching,cancelFetch,fetchProg,fetchStage,cap,showToast,celebrate,drift}){
  const[showImp,setShowImp]=useState(false);const[impTxt,setImpTxt]=useState("");const[showAdd,setShowAdd]=useState(false);
  const[execMode,setExecMode]=useState(false);const[actPx,setActPx]=useState({});const[actShares,setActShares]=useState({});
  const[manualShares,setManualShares]=useState({});const[execNote,setExecNote]=useState("");
  const[customTk,setCustomTk]=useState("");const[showTOS,setShowTOS]=useState(false);
  const[copied,setCopied]=useState(null);const[sortKey,setSortKey]=useState("cat");const[sortDir,setSortDir]=useState("asc");
  const[shareOverrides,setShareOverrides]=useState({});
  const[showQuickPx,setShowQuickPx]=useState(false);const[quickPxTxt,setQuickPxTxt]=useState("");
  const parseQuickPx=()=>{const px={};const text=quickPxTxt.toUpperCase().replace(/：/g,":").replace(/＝/g,"=").replace(/\$/g,"");
    // Support: SPY:596.47 or SPY=596.47 or SPY 596.47 (one per line or space-separated)
    const re=/([A-Z_]{1,6})\s*[:=]?\s*(\d+(?:\.\d+)?)/g;let m;
    while((m=re.exec(text))!==null){const n=parseFloat(m[2]);if(n>0)px[m[1]]=n}
    if(Object.keys(px).length){saveP({...p,prices:{...p.prices,...px}});setShowQuickPx(false);setQuickPxTxt("");showToast(`✅ 已更新 ${Object.keys(px).length} 檔股價`)}else showToast("格式錯誤，範例：SPY:596.47","error")};
  const cap2=p.capitalMode==="fixed"?p.capital:(cap||p.capital);
  const totalPct=Object.values(p.targets).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const isValid=Math.abs(totalPct-100)<0.5;
  const setTgt=(tk,rv)=>{const t={...p.targets};if(rv===""||rv==null)delete t[tk];else{const n=parseFloat(rv);t[tk]=isNaN(n)?0:n}setShareOverrides(prev=>{const n={...prev};delete n[tk];return n});saveP({...p,targets:t})};
  const setPx=(tk,v)=>{setShareOverrides(prev=>{const n={...prev};delete n[tk];return n});saveP({...p,prices:{...p.prices,[tk]:parseFloat(v)||0}})};
  const rmAsset=tk=>{const t={...p.targets};delete t[tk];const h={...p.holdings};delete h[tk];setShareOverrides(prev=>{const n={...prev};delete n[tk];return n});saveP({...p,targets:t,holdings:h})};
  const parseImp=()=>{const a={};const text=impTxt.toUpperCase().replace(/％/g,"%").replace(/：/g,":");const re=/([A-Z]{1,6})\s*:?\s*(\d+(?:\.\d+)?)\s*%/g;let m;while((m=re.exec(text))!==null)a[m[1]]=parseFloat(m[2]);if(Object.keys(a).length){setShareOverrides({});saveP({...p,targets:a});setShowImp(false);setImpTxt("");showToast("已匯入 "+Object.keys(a).length+" 檔")}else showToast("格式錯誤","error")};
  const addAsset=tk=>saveP({...p,targets:{...p.targets,[tk]:10}});
  const allTks=[...new Set([...Object.keys(p.targets),...Object.keys(p.holdings).filter(k=>p.holdings[k]?.shares>0)])];
  const rawO=allTks.map(tk=>{const info=getA(tk),px=p.prices[tk]||0,cur=p.holdings[tk]?.shares||0,avg=p.holdings[tk]?.avgCost||0,pct=parseFloat(p.targets[tk])||0,tv=cap2*(pct/100),autoSh=px>0?Math.floor(tv/px):0,tsh=shareOverrides[tk]!=null?shareOverrides[tk]:autoSh,isManual=shareOverrides[tk]!=null,diff=tsh-cur;return{tk,info,price:px,cur,avg,pct,tv,tsh,autoSh,isManual,diff,dv:diff*px}});
  const orders=sortOrd(rawO,sortKey,sortDir);
  const sumBuy=orders.filter(o=>o.diff>0).reduce((s,o)=>s+o.dv,0);const sumSell=Math.abs(orders.filter(o=>o.diff<0).reduce((s,o)=>s+o.dv,0));const invested=orders.reduce((s,o)=>s+o.tsh*o.price,0);
  const hasPx=orders.filter(o=>o.pct>0).every(o=>o.price>0);const canExec=isValid&&hasPx;
  const tosO=genTOS(orders);const tosAll=orders.filter(o=>o.tsh>0&&o.price>0).map(o=>`BUY +${o.tsh} ${o.tk} @${o.price.toFixed(2)} LMT`);
  const startExec=()=>{const ap={},as={};orders.forEach(o=>{if(o.pct>0){ap[o.tk]=o.price;as[o.tk]=o.tsh}});setActPx(ap);setActShares(as);setManualShares({});setExecMode(true)};
  const updateActPx=(tk,v)=>{const px=parseFloat(v)||0;setActPx(x=>({...x,[tk]:px}));if(!manualShares[tk]){const o=orders.find(x=>x.tk===tk);const sh=px>0&&o?Math.floor(cap2*(o.pct/100)/px):0;setActShares(x=>({...x,[tk]:sh}))}};
  const updateActShares=(tk,v)=>{setActShares(x=>({...x,[tk]:parseInt(v)||0}));setManualShares(x=>({...x,[tk]:true}))};
  const resetShares=tk=>{const o=orders.find(x=>x.tk===tk);const px=actPx[tk]||0;const sh=px>0&&o?Math.floor(cap2*(o.pct/100)/px):0;setActShares(x=>({...x,[tk]:sh}));setManualShares(x=>{const n={...x};delete n[tk];return n})};
  const updateTargetShares=(tk,v)=>{const val=v===""?undefined:parseFloat(v);if(val===undefined||isNaN(val)){setShareOverrides(prev=>{const n={...prev};delete n[tk];return n})}else{setShareOverrides(prev=>({...prev,[tk]:Math.max(0,Math.round(val))}))}};
  const resetTargetShares=tk=>{setShareOverrides(prev=>{const n={...prev};delete n[tk];return n})};
  const confirmExec=async()=>{const nh={};let inv=0;for(const[tk,sh]of Object.entries(actShares)){const ep=actPx[tk]||0;if(sh>0&&ep>0){nh[tk]={shares:sh,avgCost:ep};inv+=sh*ep}}const prevShares={};for(const[t,h]of Object.entries(p.holdings))prevShares[t]=h.shares||0;const rec={id:uid(),date:td(),type:"rebalance",targets:{...p.targets},prices:{...p.prices},actualPrices:{...actPx},shares:{...actShares},prevShares,capital:cap2,nav:cap2,cash:cap2-inv,benchPrice:p.prices[p.benchmark]||0,notes:execNote};try{const ok=await saveP({...p,holdings:nh,cash:cap2-inv,history:[...p.history,rec]});setExecMode(false);setExecNote("");setShareOverrides({});if(ok)celebrate("🎊 下單並記錄完成！");else showToast("⚠️ 資料已套用但儲存可能未成功，建議匯出備份","warn")}catch(e){showToast("⚠️ 記錄失敗: "+e.message,"error")}};
  const doCopy=txt=>{try{const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta)}catch{}};
  const toggleSort=key=>{if(sortKey===key)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(key);setSortDir("asc")}};
  return <div>
    {drift.needRebal&&<GCard hover={false} style={{padding:"8px 14px",marginBottom:10,borderColor:"rgba(239,68,68,.3)",background:"rgba(127,29,29,.15)"}}><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:12}}>⚠️</span><span style={{fontSize:11,fontWeight:700,color:"#fca5a5"}}>落差超過閾值 ({p.driftThreshold||5}%)</span>{drift.drifts.slice(0,3).map(d=><span key={d.tk} style={{fontSize:10,padding:"1px 6px",background:"rgba(239,68,68,.1)",borderRadius:4,color:d.drift>0?"#22c55e":"#ef4444"}}>{d.tk} {d.drift>0?"+":""}{d.drift}%</span>)}</div></GCard>}
    <GCard style={{padding:"8px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",borderColor:"rgba(59,130,246,.15)"}}>
      <span style={{fontSize:10,color:"var(--text2)",fontWeight:700}}>💰 資金設定</span>
      <input type="number" style={{...gs.fi,width:110}} value={p.capital} onChange={e=>saveP({...p,capital:parseFloat(e.target.value)||0})}/>
      <div style={{display:"flex",gap:10}}>{[["fixed","固定金額"],["dynamic","動態淨值"]].map(([v,l])=><label key={v} style={{display:"flex",gap:4,cursor:"pointer",fontSize:10,color:p.capitalMode===v?"#93c5fd":"#94a3b8",fontWeight:p.capitalMode===v?700:400}}><input type="radio" name="cm_reb" checked={p.capitalMode===v} onChange={()=>saveP({...p,capitalMode:v})}/>{l}</label>)}</div>
      <span style={{marginLeft:"auto",fontSize:10,color:"var(--text4)"}}>實際投入: <b style={{color:"var(--text)"}}>{$f(cap2)}</b></span>
    </GCard>
    <div style={gs.ctrlBar}><div style={gs.ctrlG}><RippleBtn style={gs.btnP} onClick={()=>setShowImp(!showImp)}>{t("importSignal",lang)}</RippleBtn><RippleBtn style={{...gs.btnA,minWidth:90}} onClick={fetching?cancelFetch:()=>fetchPrices(p)}>{fetching?<span style={{display:"flex",alignItems:"center",gap:5}}><span style={{animation:"spin .8s linear infinite",display:"inline-block"}}>⟳</span>取消</span>:t("updatePrice",lang)}</RippleBtn><RippleBtn style={{...gs.btnG,color:"#fbbf24"}} onClick={()=>setShowQuickPx(!showQuickPx)}>{t("pastePrice",lang)}</RippleBtn><RippleBtn style={gs.btnG} onClick={()=>setShowAdd(!showAdd)}>{t("addAsset",lang)}</RippleBtn>{(tosO.length>0||tosAll.length>0)&&<RippleBtn style={{...gs.btnG,color:"#fbbf24"}} onClick={()=>setShowTOS(!showTOS)}>📋 TOS{tosO.length>0?` (${tosO.length})`:""}</RippleBtn>}</div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{...gs.badge,background:isValid?"rgba(6,95,70,.8)":"rgba(124,45,18,.8)"}}>{totalPct.toFixed(1)}%</span><HelpTip tips={["貼上如 TQQQ:60% TMF:40% 自動匯入","AI 批次抓取即時市價（sandbox 可能較慢）","📝 貼上股價：從 Google 搜尋複製價格快速填入","配置合計 100% + 有股價後可下單記錄","點擊股數欄可手動修改，橘框=已修改"]}/></div></div>

ndefined||isNaN(val))setShareOverrides(prev=>{const n={...prev};delete n[r.tk];return n});else setShareOverrides(prev=>({...prev,[r.tk]:Math.max(0,Math.round(val))}))}} min={0}/>{r.isManual&&<button style={{fontSize:8,padding:"1px 3px",background:"none",border:"none",color:"#f59e0b",cursor:"pointer"}} onClick={()=>setShareOverrides(prev=>{const n={...prev};delete n[r.tk];return n})}>↺</button>}</div></td><td style={gs.tdr}>{r.px>0?$f(r.actualVal):"—"}</td></tr>)}</tbody></table></div><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><PieChart data={pieData} size={200}/><div style={{display:"flex",flexDirection:"column",gap:2}}>{pieData.map((d,i)=><div key={d.label} style={{display:"flex",alignItems:"center",gap:5,fontSize:10}}><div style={{width:8,height:8,borderRadius:2,background:d.color}}/><span style={{color:"var(--text)",minWidth:35}}>{d.label}</span><span style={{color:"var(--text2)"}}>{d.tickers?d.tickers.join(", "):""}</span></div>)}</div></div></div>

    </>}

function DashV({p,perf,benchP,lang="zh"}){const{records,totalReturn,annReturn,maxDD}=perf;const risk=calcRisk(p.history);
  const[plates,setPlates]=useState([]);useEffect(()=>{(async()=>{const d=await sG(PLK+p.id);if(d)setPlates(d)})()},[p.id]);
  const platePerf=plates.map(pl=>{const shares=pl.shares||{},savePx=pl.prices||{};const init=Object.entries(shares).reduce((s,[tk,sh])=>s+(sh*(savePx[tk]||0)),0);const cur=Object.entries(shares).reduce((s,[tk,sh])=>s+(sh*(p.prices[tk]||savePx[tk]||0)),0);return{...pl,init,cur,ret:init>0?(cur/init-1)*100:0}});
  const hList=Object.entries(p.holdings).filter(([,h])=>h.shares>0).map(([tk,h])=>{const px=p.prices[tk]||0;return{tk,...h,px,mv:h.shares*px,pnl:px>0&&h.avgCost>0?(px/h.avgCost-1)*100:0}}).sort((a,b)=>b.mv-a.mv);const tmv=hList.reduce((s,h)=>s+h.mv,0);
  const catMap={};hList.forEach(h=>{const c=getA(h.tk).cat;catMap[c]=(catMap[c]||0)+h.mv});
  return <div>
    <h2 style={{...gs.vt,margin:"0 0 10px"}}>📈 績效與風險</h2>
    {records.length<2&&<GCard hover={false} style={{padding:"12px 16px",marginBottom:14,borderColor:"rgba(245,158,11,.2)"}}><div style={{display:"flex",gap:10}}><span style={{fontSize:18}}>💡</span><div style={{fontSize:10,color:"#d97706",lineHeight:1.8}}>① 再平衡頁設定配置 → 更新股價 → 下單並記錄<br/>② 累計兩筆以上才能計算績效與風險指標</div></div></GCard>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:9,marginBottom:14}}>{[{l:"累計報酬",v:Pf(totalReturn),c:totalReturn>=0?"#22c55e":"#ef4444",icon:"💰"},{l:"年化報酬",v:annReturn!=null?Pf(annReturn):"—",c:(annReturn||0)>=0?"#22c55e":"#ef4444",icon:"📅"},{l:"最大回撤",v:Nf(maxDD)+"%",c:"#ef4444",icon:"📉"},{l:p.benchmark,v:Pf(benchP.totalReturn),c:benchP.totalReturn>=0?"#60a5fa":"#ef4444",icon:"🏷"},{l:"超額 α",v:Pf(totalReturn-benchP.totalReturn),c:totalReturn-benchP.totalReturn>=0?"#22c55e":"#ef4444",icon:"⚡"}].map((d,i)=><MCard key={i} {...d}/>)}</div>
    {risk&&<GCard style={{padding:12,marginBottom:12}}><h3 style={gs.pt}>📊 風險指標 ({risk.periods} 期)</h3><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>{[{l:"Sharpe Ratio",v:risk.sharpe.toFixed(2),c:risk.sharpe>1?"#22c55e":risk.sharpe>0.5?"#f59e0b":"#ef4444"},{l:"Sortino Ratio",v:risk.sortino.toFixed(2),c:risk.sortino>1.5?"#22c55e":"#f59e0b"},{l:"Beta",v:risk.beta!=null?risk.beta.toFixed(2):"—",c:risk.beta!=null?(Math.abs(risk.beta)>1.5?"#f87171":"#34d399"):undefined},{l:"波動率",v:risk.volatility.toFixed(2)+"%",c:"#fbbf24"},{l:"期均報酬",v:risk.avgReturn.toFixed(2)+"%",c:risk.avgReturn>=0?"#22c55e":"#ef4444"}].map((d,i)=><div key={i} style={{padding:"8px 10px",background:"var(--input-bg)",borderRadius:8,border:"1px solid var(--card-border)"}}><div style={{fontSize:8,color:"var(--text3)",textTransform:"uppercase",marginBottom:2}}>{d.l}</div><div style={{fontSize:16,fontWeight:800,color:d.c||"#e2e8f0"}}>{d.v}</div></div>)}</div></GCard>}
    {Object.entries(catMap).length>0&&<GCard style={{padding:12,marginBottom:12}}><h3 style={gs.pt}>類別分布</h3><div style={{display:"flex",borderRadius:6,overflow:"hidden",height:22}}>{Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([cat,mv])=>{const pct=tmv>0?mv/tmv*100:0;const info=Object.values(ASSET_DB).find(a=>a.cat===cat);return pct>1?<div key={cat} style={{width:pct+"%",background:info?.c||"#64748b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff"}}>{pct>10?cat:""}</div>:null})}</div></GCard>}
    {records.length>1&&<GCard style={{padding:12,marginBottom:12}}><h3 style={gs.pt}>淨值走勢</h3><div style={{display:"flex",alignItems:"flex-end",gap:2,height:100}}>{(()=>{const ns=records.map(r=>r.nav);const mx=Math.max(...ns),mn=Math.min(...ns),rg=mx-mn||1;return records.map((r,i)=>{const h=((r.nav-mn)/rg)*100,up=r.nav>=(records[i-1]?.nav??r.nav);return <div key={i} style={{flex:1,height:"100%",display:"flex",alignItems:"flex-end",minWidth:3}} title={`${r.date} ${$f(r.nav)}`}><div style={{width:"100%",height:`${Math.max(h,3)}%`,borderRadius:"2px 2px 0 0",background:up?"#22c55e":"#ef4444"}}/></div>})})()}</div></GCard>}

    {hList.length>0&&<GCard style={{padding:12}}><h3 style={gs.pt}>持倉明細</h3><table style={gs.tbl}><thead><tr><th style={gs.th}>資產</th><th style={gs.th}>股數</th><th style={gs.th}>市值</th><th style={gs.th}>佔比</th><th style={gs.th}>損益</th></tr></thead><tbody>{hList.map(h=><tr key={h.tk} style={gs.tr}><td style={gs.tdB}><span style={{...gs.dot,background:getA(h.tk).c}}/>{h.tk}</td><td style={gs.tdr}>{h.shares}</td><td style={gs.tdr}>{$f(h.mv)}</td><td style={gs.tdr}>{tmv>0?Nf(h.mv/tmv*100)+"%":"—"}</td><td style={{...gs.tdr,color:h.pnl>=0?"#22c55e":"#ef4444",fontWeight:600}}>{Pf(h.pnl)}</td></tr>)}</tbody></table></GCard>}
  </div>;

function DividendV({p,showToast,lang="zh"}){const[divData,setDivData]=useState({});const[loading,setLoading]=useState(false);const[plates,setPlates]=useState([]);const[source,setSource]=useState("holdings");
  useEffect(()=>{(async()=>{const d=await sG(PLK+p.id);if(d)setPlates(d)})()},[p.id]);
  let srcTks=[],srcLabel="再平衡持倉";if(source==="holdings"){srcTks=Object.keys(p.holdings).filter(k=>p.holdings[k]?.shares>0);srcLabel="再平衡持倉"}else{const pl=plates.find(x=>x.id===source);if(pl){srcTks=Object.keys(pl.shares||{}).filter(k=>(pl.shares[k]||0)>0);srcLabel="菜盤："+pl.name}}
  const getShPx=(tk)=>{if(source==="holdings"){const h=p.holdings[tk];return{sh:h?.shares||0,px:p.prices[tk]||0}}const pl=plates.find(x=>x.id===source);if(!pl)return{sh:0,px:0};return{sh:pl.shares?.[tk]||0,px:pl.prices?.[tk]||p.prices[tk]||0}};
  const fetchDiv=async()=>{showToast("請在下方手動輸入股息資料","warn");setLoading(false)};
  const rows=srcTks.map(tk=>{const{sh,px}=getShPx(tk),mv=sh*px,d=divData[tk.toUpperCase()]||divData[tk]||{};const yld=parseFloat(d.yield)||0;const annInc=mv*(yld/100);return{tk,sh,px,mv,...d,yield:yld,annInc,info:getA(tk)}});
  const totalMV=rows.reduce((s,r)=>s+r.mv,0);const totalInc=rows.reduce((s,r)=>s+r.annInc,0);const avgYld=totalMV>0?(totalInc/totalMV*100):0;
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
      <select style={{...gs.fi,width:"auto",minWidth:160}} value={source} onChange={e=>setSource(e.target.value)}><option value="holdings">📊 再平衡持倉</option>{plates.map(pl=><option key={pl.id} value={pl.id}>🍽 {pl.name}</option>)}</select>
      <RippleBtn style={{...gs.btnA,opacity:loading?.5:1}} onClick={fetchDiv} disabled={loading||!srcTks.length}>{loading?"⟳ 查詢中...":"🔍 查詢股息"}</RippleBtn>
    </div>

function SimulatorV({p}){const[drop,setDrop]=useState(-20);
  const hList=Object.entries(p.holdings).filter(([,h])=>h.shares>0).map(([tk,h])=>{const px=p.prices[tk]||0,mv=h.shares*px,info=getA(tk),beta=info.beta!=null?info.beta:1;const impact=mv*(beta*(drop/100));const newMV=mv+impact;return{tk,mv,beta,impact,newMV,pct:mv>0?(impact/mv*100):0,info}});
  const totalMV=hList.reduce((s,h)=>s+h.mv,0);const totalImpact=hList.reduce((s,h)=>s+h.impact,0);const totalPct=totalMV>0?(totalImpact/totalMV*100):0;
  return <div>
    <GCard style={{padding:14,marginBottom:12}}><h3 style={gs.pt}>市場情境：SPY {drop>0?"+":""}{drop}%</h3><input type="range" min={-50} max={30} value={drop} onChange={e=>setDrop(+e.target.value)} style={{width:"100%",accentColor:drop>=0?"#22c55e":"#ef4444"}}/><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text3)",marginTop:4}}><span>-50%</span><span style={{fontWeight:700,fontSize:14,color:drop>=0?"#22c55e":"#ef4444"}}>{drop>0?"+":""}{drop}%</span><span>+30%</span></div></GCard>
    {!hList.length?<GCard hover={false} style={{padding:20,textAlign:"center"}}><p style={{color:"var(--text3)"}}>先建立持倉再模擬</p></GCard>
    :<><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:9,marginBottom:12}}><MCard l="預估組合衝擊" v={Pf(totalPct)} c={totalPct>=0?"#22c55e":"#ef4444"} icon="💥"/><MCard l="預估損益" v={$f(totalImpact)} c={totalImpact>=0?"#22c55e":"#ef4444"} icon="💰"/><MCard l="模擬後淨值" v={$f(totalMV+totalImpact)} icon="📊"/></div>
    <div style={gs.tblW}><table style={gs.tbl}><thead><tr><th style={gs.th}>資產</th><th style={gs.th}>Beta</th><th style={gs.th}>現值</th><th style={gs.th}>預估衝擊</th><th style={gs.th}>模擬後</th></tr></thead><tbody>{hList.sort((a,b)=>a.impact-b.impact).map((h,i)=><tr key={h.tk} style={{...gs.tr,animation:`slideInL .2s ${i*.04}s both`}}><td style={gs.tdB}><span style={{...gs.dot,background:h.info.c}}/>{h.tk}</td><td style={{...gs.tdr,color:Math.abs(h.beta)>2?"#f87171":"#94a3b8"}}>{h.beta.toFixed(1)}x</td><td style={gs.tdr}>{$f(h.mv)}</td><td style={{...gs.tdr,fontWeight:700,color:h.impact>=0?"#22c55e":"#ef4444"}}>{$f(h.impact)} ({h.pct>0?"+":""}{h.pct.toFixed(1)}%)</td><td style={gs.tdr}>{$f(h.newMV)}</td></tr>)}</tbody></table></div></>}
  </div>;
}

function PlannerV(){const[target,setTarget]=useState(100000);const[monthly,setMonthly]=useState(2000);const[initCap,setInitCap]=useState(10000);const[rate,setRate]=useState(10);
  const r=rate/100/12;const months=r>0?Math.log((target*r+monthly)/(initCap*r+monthly))/Math.log(1+r):((target-initCap)/monthly);const years=Math.max(0,months/12);
  const milestones=[];let bal=initCap;for(let y=1;y<=Math.ceil(years)+1&&y<=50;y++){bal=bal*Math.pow(1+rate/100,1)+monthly*12*((Math.pow(1+rate/100,1)-1)/(rate/100||1));milestones.push({year:y,bal});if(bal>=target)break}
  return <div>
    <GCard style={{padding:14,marginBottom:12}}><h3 style={gs.pt}>🎯 投資目標規劃器</h3><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><label style={gs.fl}>目標金額 ($)</label><input type="number" style={gs.fi} value={target} onChange={e=>setTarget(+e.target.value)}/></div><div><label style={gs.fl}>初始資金 ($)</label><input type="number" style={gs.fi} value={initCap} onChange={e=>setInitCap(+e.target.value)}/></div><div><label style={gs.fl}>每月投入 ($)</label><input type="number" style={gs.fi} value={monthly} onChange={e=>setMonthly(+e.target.value)}/></div><div><label style={gs.fl}>預期年化報酬 (%)</label><input type="number" style={gs.fi} value={rate} onChange={e=>setRate(+e.target.value)} step={0.5}/></div></div></GCard>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:9,marginBottom:14}}><MCard l="預計達成" v={years<100?years.toFixed(1)+"年":"—"} c="#3b82f6" icon="⏰"/><MCard l="總投入" v={$f(initCap+monthly*12*years)} icon="💰"/><MCard l="投資收益" v={$f(target-initCap-monthly*12*years)} c="#22c55e" icon="📈"/></div>
    <GCard style={{padding:12}}><h3 style={gs.pt}>里程碑</h3><div style={{display:"flex",alignItems:"flex-end",gap:3,height:120}}>{milestones.map((m,i)=>{const pct=Math.min(m.bal/target*100,100);const hit=m.bal>=target;return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><div style={{fontSize:8,color:hit?"#22c55e":"#64748b"}}>{hit?"🎯":""}</div><div style={{width:"100%",height:`${Math.max(pct,3)}%`,borderRadius:"3px 3px 0 0",background:hit?"#22c55e":"#3b82f6",transition:"height .3s"}} title={`第${m.year}年: ${$f(m.bal)}`}/><div style={{fontSize:7,color:"var(--text3)"}}>{m.year}</div></div>})}</div></GCard>
  </div>;
}

function CompareV({portfolios}){const[sel,setSel]=useState([null,null]);const[data,setData]=useState([null,null]);

  const getVals=d=>{if(!d)return labels.map(()=>"—");const{perf,risk}=d;return[Pf(perf.totalReturn),perf.annReturn!=null?Pf(perf.annReturn):"—",Nf(perf.maxDD)+"%",risk?risk.sharpe.toFixed(2):"—",risk?risk.sortino.toFixed(2):"—",risk?.beta!=null?risk.beta.toFixed(2):"—",risk?risk.volatility.toFixed(2)+"%":"—",d.history.length+"次"]};

  const rebalDates={};p.history.forEach(r=>{const d=r.date;if(d?.startsWith(monthStr.slice(0,7))){const day=parseInt(d.slice(8,10));rebalDates[day]=r}});

}

function HistV({p,saveP,showToast,lang="zh"}){const[expId,setExpId]=useState(null);const[enId,setEnId]=useState(null);const[nt,setNt]=useState("");const[showManual,setShowManual]=useState(false);const[mForm,setMForm]=useState({date:td(),nav:"",capital:"",targets:"",prices:"",shares:"",notes:""});

    const stxt=mForm.shares.toUpperCase().replace(/：/g,":");
    while((m3=re3.exec(stxt))!==null)shares[m3[1]]=parseInt(m3[2]);
    const rec={id:uid(),date:mForm.date,type:"manual",targets,prices:actualPrices,actualPrices,shares,prevShares:{},capital,nav,cash:0,benchPrice:0,notes:mForm.notes,isManual:true};
    const h=[...p.history,rec].sort((a,b)=>a.date.localeCompare(b.date));
    await saveP({...p,history:h});setShowManual(false);setMForm({date:td(),nav:"",capital:"",targets:"",prices:"",shares:"",notes:""});showToast("✅ 已補填歷史記錄");
  };const base=p.history.length>0?p.history[0].capital:0;const dec=p.history.map((r,i)=>{const pv=i>0?p.history[i-1].nav:base;return{...r,periodRet:pv>0?(r.nav/pv-1)*100:0,cumRet:base>0?(r.nav/base-1)*100:0}});

    {showManual&&<GCard glow="#8b5cf6" style={{padding:14,marginBottom:12,animation:"celebPop .25s ease"}}><h4 style={{margin:"0 0 8px",fontSize:12,color:"#a78bfa"}}>✏️ 手動補填歷史記錄</h4><p style={{fontSize:10,color:"var(--text3)",margin:"0 0 10px"}}>適合從舊版遷移資料。填入當時的日期與淨值，補填後會依日期自動排序。</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>

    </GCard>}{[...dec].reverse().map((r,ri)=>{const idx=p.history.length-1-ri;const exp=expId===idx;const entries=Object.entries(r.targets||{}).filter(([,v])=>v>0);return <GCard key={idx} style={{marginBottom:5,padding:10,animation:`slideInL .2s ${ri*.03}s both`}}><div style={{display:"flex",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setExpId(exp?null:idx)}><div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}><b style={{fontSize:12,color:"var(--text)"}}>{r.date}</b><span style={{color:"#60a5fa",fontSize:12}}>{$f(r.nav)}</span>{r.isManual&&<span style={{fontSize:9,padding:"1px 5px",background:"rgba(139,92,246,.15)",border:"1px solid rgba(139,92,246,.3)",borderRadius:4,color:"#a78bfa"}}>手動</span>}{r.cumRet!=null&&<span style={{fontSize:10,color:r.cumRet>=0?"#22c55e":"#ef4444"}}>{Pf(r.cumRet)}</span>}</div><div style={{display:"flex",gap:4}}><span style={{fontSize:9,color:"var(--text4)"}}>{exp?"▲":"▼"}</span><button style={gs.btnX} onClick={async e=>{e.stopPropagation();const h=[...p.history];h.splice(idx,1);await saveP({...p,history:h});showToast("🗑","warn")}}>🗑</button></div></div><div style={{display:"flex",gap:3,marginTop:4,flexWrap:"wrap"}}>{entries.map(([t,v])=><span key={t} style={{padding:"1px 5px",background:"var(--input-bg)",borderRadius:6,fontSize:9,color:"var(--text2)"}}>{t} {v}%</span>)}</div>{r.notes&&!exp&&<div style={{fontSize:9,color:"var(--text3)",marginTop:2}}>📝 {r.notes}</div>}{exp&&<div style={{marginTop:6,borderTop:"1px solid rgba(255,255,255,.04)",paddingTop:6}}>{enId===idx?<div style={{display:"flex",gap:4,marginBottom:6}}><textarea style={{...gs.ta,flex:1}} rows={2} value={nt} onChange={e=>setNt(e.target.value)} autoFocus/><RippleBtn style={{...gs.btnP,fontSize:10}} onClick={async()=>{const h=[...p.history];h[idx]={...h[idx],notes:nt};await saveP({...p,history:h});setEnId(null);showToast("📝")}}>存</RippleBtn></div>:<button style={{...gs.btnG,fontSize:9,marginBottom:6}} onClick={()=>{setEnId(idx);setNt(r.notes||"")}}>📝 {r.notes?"編輯":"新增"}筆記</button>}<table style={{...gs.tbl,fontSize:10}}><thead><tr><th style={gs.th}>資產</th><th style={gs.th}>%</th><th style={gs.th}>市價</th><th style={gs.th}>成交</th><th style={gs.th}>股數</th><th style={gs.th}>異動</th></tr></thead><tbody>{entries.map(([t,pct])=>{const mp=r.prices?.[t]||0,ap=r.actualPrices?.[t]||mp,sh=r.shares?.[t]||0,prev=r.prevShares?.[t]||0,d=sh-prev;return <tr key={t} style={gs.tr}><td style={gs.tdB}>{t}</td><td style={gs.tdr}>{pct}%</td><td style={gs.tdr}>{Nf(mp)}</td><td style={gs.tdr}>{Nf(ap)}</td><td style={gs.tdr}>{sh}</td><td style={{...gs.tdr,fontWeight:700,color:d>0?"#22c55e":d<0?"#ef4444":"#64748b"}}>{d>0?"+":""}{d}</td></tr>})}</tbody></table></div>}</GCard>})}</div>;
}

function SetV({p,saveP,deleteP,portfolios,saveIdx,showToast,cfg,saveCfg,avatar,saveAvatar,watchlist,theme,setTheme,lang,setLang}){const[confirmDel,setConfirmDel]=useState(false);const[showPaste,setShowPaste]=useState(false);const[pasteText,setPasteText]=useState("");const[showPasteAll,setShowPasteAll]=useState(false);const[pasteAllText,setPasteAllText]=useState("");const avRef=useRef(null);

  const expAll=async()=>{const allData={portfolios:[],watchlist,cfg,exportedAt:new Date().toISOString()};for(const pi of portfolios){const d=await sG(PP+pi.id);if(d){const plates=await sG(PLK+pi.id);const journal=await sG(JK+"-"+pi.id);allData.portfolios.push({...d,plates:plates||[],journal:journal||[]})}}const u="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(allData,null,2));const a=document.createElement("a");a.href=u;a.download=`bos-vp-全部備份-${td()}.json`;a.click();showToast("📦 全部資料已匯出")};
  const doCopyText=txt=>{try{const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta)}catch{}};
  const copyJSON=()=>{doCopyText(JSON.stringify(p,null,2));showToast("✅ 已複製組合 JSON")};
  const copyAll=async()=>{const allData={portfolios:[],watchlist,cfg,exportedAt:new Date().toISOString()};for(const pi of portfolios){const d=await sG(PP+pi.id);if(d){const plates=await sG(PLK+pi.id);const journal=await sG(JK+"-"+pi.id);allData.portfolios.push({...d,plates:plates||[],journal:journal||[]})}}doCopyText(JSON.stringify(allData,null,2));showToast("✅ 已複製全部資料 JSON")};
  const pasteImp=async()=>{try{const data=JSON.parse(pasteText);await saveP({...p,...data,id:p.id});showToast("✅ 已還原");setShowPaste(false);setPasteText("")}catch{showToast("JSON 格式錯誤","error")}};
  const pasteImpAll=async()=>{try{const data=JSON.parse(pasteAllText);if(!data.portfolios){showToast("非全部備份格式","error");return}for(const pd of data.portfolios){await sS(PP+pd.id,pd);if(pd.plates)await sS(PLK+pd.id,pd.plates);if(pd.journal)await sS(JK+"-"+pd.id,pd.journal)}const idx=data.portfolios.map(d=>({id:d.id,name:d.name}));await saveIdx(idx);if(data.watchlist)await sS(WK,data.watchlist);showToast("✅ 全部資料已還原，請重新整理");setShowPasteAll(false);setPasteAllText("")}catch{showToast("JSON 格式錯誤","error")}};
  const impJSON=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const data=JSON.parse(ev.target.result);if(data.portfolios&&Array.isArray(data.portfolios)){showToast("此為全部備份，請用匯入全部功能","warn")}else{await saveP({...p,...data,id:p.id});showToast("✅")}}catch{showToast("格式錯誤","error")}};r.readAsText(f);e.target.value=""};
  const impAll=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const data=JSON.parse(ev.target.result);if(!data.portfolios){showToast("非全部備份格式","error");return}for(const pd of data.portfolios){await sS(PP+pd.id,pd);if(pd.plates)await sS(PLK+pd.id,pd.plates);if(pd.journal)await sS(JK+"-"+pd.id,pd.journal)}const idx=data.portfolios.map(d=>({id:d.id,name:d.name}));await saveIdx(idx);if(data.watchlist)await sS(WK,data.watchlist);showToast("✅ 全部資料已還原，請重新整理頁面")}catch{showToast("格式錯誤","error")}};r.readAsText(f);e.target.value=""};
  return <div style={{maxWidth:500}}><h2 style={{...gs.vt,marginBottom:12}}>⚙️ 設定</h2>
    
    <GCard style={{padding:14,marginBottom:10}}><h3 style={gs.pt}>⚠️ 落差警示閾值</h3><div style={{display:"flex",alignItems:"center",gap:10}}><input type="range" min={1} max={20} value={p.driftThreshold||5} onChange={e=>saveP({...p,driftThreshold:+e.target.value})} style={{flex:1}}/><span style={{fontSize:14,fontWeight:700,color:"#f59e0b",minWidth:40,textAlign:"center"}}>{p.driftThreshold||5}%</span></div><p style={{fontSize:10,color:"var(--text3)",margin:"4px 0 0"}}>持倉偏離目標超過此比例時，標題列顯示再平衡警示</p></GCard>
    <GCard style={{padding:14,marginBottom:10}}><h3 style={gs.pt}>👤 頭像</h3>
      <div style={{marginBottom:10}}><div style={{fontSize:10,color:"var(--text2)",marginBottom:6}}>內建頭像（點選）</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{BUILTIN_AVATARS.map(a=><div key={a.id} onClick={()=>{saveAvatar(a.src);showToast("✅ 已套用")}} style={{width:44,height:44,borderRadius:"50%",overflow:"hidden",cursor:"pointer",border:avatar===a.src?"2px solid #3b82f6":"2px solid transparent",transition:"border .2s",flexShrink:0}} title={a.emoji}><img src={a.src} style={{width:"100%",height:"100%"}}/></div>)}</div></div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div onClick={()=>avRef.current?.click()} style={{width:48,height:48,borderRadius:"50%",overflow:"hidden",border:"2px solid rgba(59,130,246,.3)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f172a",flexShrink:0}}>{avatar?<img src={avatar} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:20,color:"var(--text3)"}}>📷</span>}</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}><RippleBtn style={gs.btnG} onClick={()=>avRef.current?.click()}>📁 上傳自訂圖片</RippleBtn><span style={{fontSize:9,color:"var(--text3)"}}>JPG/PNG，500KB 以下</span></div>
        {avatar&&<button style={{...gs.btnX,fontSize:10}} onClick={()=>{saveAvatar(null);showToast("已清除")}}>移除</button>}
      </div>
      <input ref={avRef} type="file" accept="image/jpeg,image/png,image/webp" style={{display:"none"}} onChange={handleAvatar}/></GCard>
    <GCard style={{padding:14,marginBottom:10}}><h3 style={gs.pt}>🔤 字體大小</h3><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:10,color:"var(--text2)"}}>小</span><input type="range" min={10} max={18} value={cfg.fontSize} onChange={e=>saveCfg({...cfg,fontSize:+e.target.value})} style={{flex:1}}/><span style={{fontSize:10,color:"var(--text2)"}}>大</span><span style={{fontSize:12,fontWeight:700,color:"#3b82f6",minWidth:30,textAlign:"center"}}>{cfg.fontSize}px</span></div></GCard>
    
    <GCard style={{padding:14,marginBottom:10}}><h3 style={gs.pt}>🎨 主題 / Theme</h3><div style={{display:"flex",gap:8}}>{[["dark","🌙 深色 Dark"],["light","☀️ 淺色 Light"]].map(([v,l])=><label key={v} style={{display:"flex",gap:4,cursor:"pointer",fontSize:11,color:theme===v?"var(--blue2)":"var(--text2)",fontWeight:theme===v?700:400}}><input type="radio" name="thm" checked={theme===v} onChange={()=>setTheme(v)}/>{l}</label>)}</div></GCard>
    <GCard style={{padding:14,marginBottom:10}}><h3 style={gs.pt}>🌐 語言 / Language</h3><div style={{display:"flex",gap:8}}>{[["zh","繁體中文"],["en","English"]].map(([v,l])=><label key={v} style={{display:"flex",gap:4,cursor:"pointer",fontSize:11,color:lang===v?"var(--blue2)":"var(--text2)",fontWeight:lang===v?700:400}}><input type="radio" name="lng" checked={lang===v} onChange={()=>setLang(v)}/>{l}</label>)}</div></GCard>
    
    <GCard style={{padding:14,marginBottom:10}}><h3 style={gs.pt}>📊 基準指標</h3><input style={gs.fi} value={p.benchmark} onChange={e=>saveP({...p,benchmark:e.target.value.toUpperCase()})} placeholder="SPY"/></GCard>
    <GCard style={{padding:14,marginBottom:10}}><h3 style={gs.pt}>💾 資料備份</h3><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><RippleBtn style={gs.btnG} onClick={expJSON}>📤 匯出組合</RippleBtn><RippleBtn style={gs.btnG} onClick={()=>document.getElementById("imp1set").click()}>📥 匯入組合</RippleBtn><input id="imp1set" type="file" accept=".json" style={{display:"none"}} onChange={impJSON}/></div><div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}><RippleBtn style={{...gs.btnP,background:"linear-gradient(135deg,#7c3aed,#6d28d9)"}} onClick={expAll}>📦 匯出全部</RippleBtn><RippleBtn style={gs.btnA} onClick={()=>document.getElementById("impAllSet").click()}>📦 匯入全部</RippleBtn><input id="impAllSet" type="file" accept=".json" style={{display:"none"}} onChange={impAll}/></div><div style={{marginTop:8,padding:"8px 10px",background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.15)",borderRadius:6}}><div style={{display:"flex",gap:6,alignItems:"center"}}><span>ℹ️</span><span style={{fontSize:10,color:"var(--blue2)",lineHeight:1.6}}>{t("storageNote",lang)}</span></div></div><p style={{fontSize:9,color:"var(--text3)",margin:"6px 0 0"}}>「全部資料」包含所有組合、菜盤、日誌、觀察清單</p></GCard>
    <GCard style={{padding:14,marginBottom:10}}><h3 style={gs.pt}>📋 複製／貼上備份</h3><p style={{fontSize:10,color:"var(--text3)",margin:"0 0 8px"}}>若下載受限：複製 JSON → 貼入記事本 → 另存 .json；還原時貼上 JSON 文字即可</p><div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}><RippleBtn style={gs.btnG} onClick={copyJSON}>📋 複製組合 JSON</RippleBtn><RippleBtn style={{...gs.btnG,color:"#a78bfa"}} onClick={copyAll}>📋 複製全部 JSON</RippleBtn></div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><RippleBtn style={gs.btnG} onClick={()=>setShowPaste(v=>!v)}>📥 貼上還原（組合）</RippleBtn><RippleBtn style={gs.btnG} onClick={()=>setShowPasteAll(v=>!v)}>📥 貼上還原（全部）</RippleBtn></div>{showPaste&&<div style={{marginTop:8}}><textarea style={{...gs.ta,height:90}} value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="貼上組合 JSON..."/><div style={{display:"flex",gap:6,marginTop:4}}><RippleBtn style={gs.btnP} onClick={pasteImp}>確認還原</RippleBtn><button style={gs.btnG} onClick={()=>{setShowPaste(false);setPasteText("")}}>取消</button></div></div>}{showPasteAll&&<div style={{marginTop:8}}><textarea style={{...gs.ta,height:90}} value={pasteAllText} onChange={e=>setPasteAllText(e.target.value)} placeholder="貼上全部備份 JSON..."/><div style={{display:"flex",gap:6,marginTop:4}}><RippleBtn style={gs.btnP} onClick={pasteImpAll}>確認還原</RippleBtn><button style={gs.btnG} onClick={()=>{setShowPasteAll(false);setPasteAllText("")}}>取消</button></div></div>}</GCard>
    <GCard style={{padding:14,borderColor:"rgba(127,29,29,.3)"}}><h3 style={{...gs.pt,color:"#ef4444"}}>⚠️ 危險區域</h3>{!confirmDel?<RippleBtn style={{...gs.btnG,color:"#ef4444",borderColor:"rgba(127,29,29,.5)"}} onClick={()=>setConfirmDel(true)}>🗑 刪除此組合</RippleBtn>:<div style={{display:"flex",flexDirection:"column",gap:8}}><p style={{fontSize:11,color:"#fca5a5",margin:0}}>確定要永久刪除「{p.name}」？</p><div style={{display:"flex",gap:8}}><button style={{padding:"6px 14px",background:"#dc2626",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}} onClick={()=>{deleteP(p.id);setConfirmDel(false)}}>確定刪除</button><button style={gs.btnG} onClick={()=>setConfirmDel(false)}>取消</button></div></div>}</GCard>
  </div>;
}



// ── Render ──
try {
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;background:#1e293b;color:#f87171;min-height:100vh"><h2 style="color:#fbbf24">⚠️ Render Error</h2><pre style="white-space:pre-wrap;color:#94a3b8">'+e.message+'\n'+e.stack+'</pre></div>';
}
</script>
</body>
</html>
